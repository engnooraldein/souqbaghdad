<body>
  <div id="root">
    <style>
      .initial-loader {
        display: flex;
        flex-direction: column;
        align-items: center;
        justify-content: center;
        height: 100vh;
        width: 100vw;
        background-color: #0c2b5e;
        font-family: 'Cairo', sans-serif;
        color: white;
      }
      .spinner {
        width: 50px;
        height: 50px;
        border: 4px solid rgba(255, 255, 255, 0.3);
        border-radius: 50%;
        border-top-color: #f59e0b; /* amber-500 */
        animation: spin 1s ease-in-out infinite;
        margin-bottom: 20px;
      }
      @keyframes spin {
        to { transform: rotate(360deg); }
      }
      .loader-text {
        font-size: 1.2rem;
        font-weight: 600;
        letter-spacing: 1px;
        animation: pulse 1.5s ease-in-out infinite;
      }
      @keyframes pulse {
        0%, 100% { opacity: 1; }
        50% { opacity: 0.5; }
      }
    </style>
    <div class="initial-loader">
      <img src="/logo.png" alt="شعار سوك بغداد" class="loader-logo" style="width: 100px; height: 100px; margin-bottom: 24px; border-radius: 20px; box-shadow: 0 8px 24px rgba(0,0,0,0.2); animation: pulse 1.5s ease-in-out infinite;" />
      <div class="loader-text">أهلاً بك في سوك بغداد</div>
      <div class="loader-subtext" style="font-size: 0.9rem; font-weight: normal; margin-top: 8px; color: rgba(255,255,255,0.8); animation: pulse 1.5s ease-in-out infinite;">جاري تحميل أحدث الإعلانات والمنتجات، يرجى الانتظار ثوانٍ...</div>
    </div>
  </div>
  <script type="module" src="/src/main.tsx"></script>
