kind = "web"
previewPath = "/"
title = "سوك بغداد"
version = "1.0.0"
id = "artifacts/souq-baghdad"
router = "path"

[[integratedSkills]]
name = "react-vite"
version = "1.0.0"

[[services]]
name = "web"
paths = [ "/" ]
localPort = 24555

[services.development]
run = "pnpm --filter @workspace/souq-baghdad run dev"

[services.production]
build = [ "pnpm", "--filter", "@workspace/souq-baghdad", "run", "build" ]
publicDir = "artifacts/souq-baghdad/dist/public"
serve = "static"

[[services.production.rewrites]]
from = "/*"
to = "/index.html"

[services.env]
PORT = "24555"
BASE_PATH = "/"
